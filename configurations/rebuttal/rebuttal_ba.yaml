label: ["polynomial_suminverse"] # ["polynomial_suminverse", "polynomial", "diffusion", "diffusion_ard", "random", "local_search", "bfs", "dfs"]
save_dir: ./logs/Aug1/
n_exp: 5 # number of experiments with different random seeds
bo_settings:
  batch_size: 1 # batch size
  max_iters: 200 # number of total queries
  max_radius: 10 # the maximum hop distance to the centre node when constructing the local context graph
  n_init: 10 # Initial queried points   
  init_method: "random_walk" # "random" "random_walk"
  Q: 4000 # the size of the context ComboSubgraph
  large_Q: False
  exploitation: False
  start_location: random #[random, ei, betweenness] # the initial starting location of search, recommended for large k
  restart_location: queried_best #[same_as_start, queried_best]
  tr_settings:    # settings related to the trust region on the graph search space
    n_nodes_min: 10         # the min number of nodes in the trust region
    trust_region_multiplier: 1.5 
    succ_tol: 10       # success tolerance
    fail_tol: 30      # fail tolerance
    shrink_tol: 10       # shrink tolerance
problem_name: synthetic # the experimental problem type
problem_settings:
  n: 500 # number of nodes in the underlying (synthetic) random graphs
  k: 16 # number of combinations
  graph_type: ba # "ws", "ba"
  underlying_function: pagerank # "betweenness_centrality" "eigenvector_centrality"
  m: 2
  noisy: True
  noise: 0.1
